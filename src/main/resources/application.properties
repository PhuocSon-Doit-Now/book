spring.datasource.password=NJJnXmAdNfFgORInpgZpfxNBeTZFRrXu
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate - Tắt in SQL và Format để tránh quá tải Log
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Cấu hình Logging - Giảm tối đa log thừa
logging.level.root=WARN
logging.level.com.example.book=INFO
logging.level.org.hibernate.orm.results.bind=OFF
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# Cấu hình Proxy cho Railway
server.forward-headers-strategy=native

# Static resources & Multipart
spring.data.web.pageable.serialization-mode=via-dto
spring.web.resources.static-locations=classpath:/static/
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

